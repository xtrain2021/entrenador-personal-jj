<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<title>Confirmación de pago</title>
</head>

<body>

<h1>⏳ Verificando tu pago...</h1>

<script>
async function verificarPago() {
    const params = new URLSearchParams(window.location.search);
    const transactionId = params.get("id");

    const modulo = localStorage.getItem("moduloPendiente");

    if (!transactionId || !modulo) {
        document.body.innerHTML = "❌ Error en la validación";
        return;
    }

    try {
        const res = await fetch("https://backend-jota.onrender.com/verificar-pago?id=" + transactionId);
        const data = await res.json();

        if (data.status === "APPROVED") {

            // 🔓 desbloqueo correcto por módulo
            localStorage.setItem("acceso_" + modulo, "true");

            document.body.innerHTML = "✅ Pago aprobado. Abriendo tu rutina...";

            setTimeout(() => {
                window.location.href = "player.html?modulo=" + modulo;
            }, 2000);

        } else {
            document.body.innerHTML = "❌ Pago no aprobado";
        }

    } catch (error) {
        document.body.innerHTML = "❌ Error verificando el pago";
    }
}

verificarPago();
</script>

</body>
</html>
